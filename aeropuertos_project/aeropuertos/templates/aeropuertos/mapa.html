<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeropuertosGlobal — Mapa Interactivo</title>
    <meta name="description" content="Visualización interactiva de aeropuertos globales con rutas de vuelo y estadísticas aéreas.">

    <!-- MapLibre GL JS: la biblioteca de mapas que usaremos -->
    <!-- CDN = se carga desde internet, no necesitamos instalarlo -->
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <!-- Google Fonts: tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           VARIABLES DE DISEÑO (Design Tokens)
           Centralizar colores y medidas facilita cambios futuros.
        ============================================================ */
        :root {
            --color-bg:          #0a0e1a;
            --color-panel:       rgba(13, 18, 35, 0.92);
            --color-border:      rgba(255, 255, 255, 0.08);
            --color-accent:      #3b82f6;
            --color-accent-glow: rgba(59, 130, 246, 0.35);
            --color-text:        #e2e8f0;
            --color-text-muted:  #64748b;
            --color-airport:     #38bdf8;
            --color-airport-glow:rgba(56, 189, 248, 0.6);
            --radius:            12px;
            --transition:        0.25s ease;
        }

        /* ============================================================
           RESET Y BASE
        ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            height: 100vh;
            overflow: hidden;
        }

        /* ============================================================
           LAYOUT PRINCIPAL
        ============================================================ */
        #app {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        /* ============================================================
           BARRA SUPERIOR (HEADER)
        ============================================================ */
        #header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--color-panel);
            border-bottom: 1px solid var(--color-border);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .header-brand .icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--color-accent), #06b6d4);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }

        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        .header-stats span strong {
            color: var(--color-accent);
            font-size: 1rem;
        }

        /* ============================================================
           PANEL LATERAL IZQUIERDO
        ============================================================ */
        #sidebar {
            background: var(--color-panel);
            border-right: 1px solid var(--color-border);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .sidebar-section h3 {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 14px;
        }

        /* Buscador */
        .search-box {
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        #search-input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-glow);
        }

        #search-input::placeholder { color: var(--color-text-muted); }

        .search-icon {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        /* Lista de aeropuertos */
        #airport-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .airport-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background var(--transition);
            border: 1px solid transparent;
        }

        .airport-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .airport-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--color-accent);
        }

        .airport-iata {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--color-airport);
            min-width: 36px;
            font-family: 'Courier New', monospace;
        }

        .airport-info { flex: 1; min-width: 0; }

        .airport-name {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .airport-location {
            font-size: 0.72rem;
            color: var(--color-text-muted);
            margin-top: 2px;
        }

        /* ============================================================
           MAPA
        ============================================================ */
        #map {
            width: 100%;
            height: 100%;
        }

        /* ============================================================
           POPUP DEL MAPA
        ============================================================ */
        .maplibregl-popup-content {
            background: var(--color-panel) !important;
            border: 1px solid var(--color-border) !important;
            border-radius: var(--radius) !important;
            padding: 16px !important;
            color: var(--color-text) !important;
            backdrop-filter: blur(20px) !important;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5) !important;
            min-width: 220px;
        }

        .maplibregl-popup-tip {
            border-top-color: var(--color-panel) !important;
        }

        .popup-iata {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--color-airport);
            letter-spacing: 0.05em;
            font-family: 'Courier New', monospace;
        }

        .popup-name {
            font-size: 0.85rem;
            font-weight: 500;
            margin: 4px 0 10px;
            line-height: 1.4;
        }

        .popup-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        .popup-detail span { color: var(--color-text); }

        /* ============================================================
           CONTROL DE ZOOM PERSONALIZADO
        ============================================================ */
        .maplibregl-ctrl-group {
            background: var(--color-panel) !important;
            border: 1px solid var(--color-border) !important;
            border-radius: 8px !important;
        }

        .maplibregl-ctrl-group button {
            color: var(--color-text) !important;
        }

        /* ============================================================
           INDICADOR DE CARGA
        ============================================================ */
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 24px 32px;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
           BADGE DE CONTEO
        ============================================================ */
        .count-badge {
            background: var(--color-accent);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            margin-left: auto;
        }
    </style>
</head>

<body>
<div id="app">

    <!-- ===== HEADER ===== -->
    <header id="header">
        <div class="header-brand">
            <div class="icon">✈</div>
            <span>AeropuertosGlobal</span>
        </div>
        <div class="header-stats">
            <div>
                Aeropuertos: <strong id="total-count">...</strong>
            </div>
            <div>
                Seleccionado: <strong id="selected-iata">—</strong>
            </div>
            <div style="color: #22c55e; font-size: 0.75rem;">
                ● API activa
            </div>
        </div>
    </header>

    <!-- ===== SIDEBAR ===== -->
    <aside id="sidebar">
        <!-- Buscador -->
        <div class="sidebar-section">
            <h3>🔍 Buscar aeropuerto</h3>
            <div class="search-box">
                <span class="search-icon">⌕</span>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Ciudad, IATA o nombre..."
                    autocomplete="off"
                >
            </div>
        </div>

        <!-- Lista de aeropuertos -->
        <div id="airport-list" role="list" aria-label="Lista de aeropuertos">
            <!-- Se llena con JavaScript -->
        </div>
    </aside>

    <!-- ===== MAPA ===== -->
    <main style="position:relative;">
        <div id="loading">
            <div class="spinner"></div>
            <div style="font-size:0.85rem; color: var(--color-text-muted);">Cargando mapa...</div>
        </div>
        <div id="map"></div>
    </main>

</div>

<script>
// ================================================================
// CONFIGURACIÓN
// ================================================================
const MAPTILER_KEY = "{{ maptiler_key }}";
// URL de nuestra API REST - ahora los datos vienen del servidor dinámicamente
const API_GEOJSON_URL = "/api/aeropuertos/geojson/";

// Variable global donde guardaremos los datos cargados de la API
let todosLosAeropuertos = [];

// ================================================================
// INICIALIZACIÓN DEL MAPA
// ================================================================
const map = new maplibregl.Map({
    container: 'map',
    style: `https://api.maptiler.com/maps/dataviz-dark/style.json?key=${MAPTILER_KEY}`,
    center: [-95, 25],
    zoom: 3.5,
    minZoom: 1,
    maxZoom: 18,
    antialias: true,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-right');

// ================================================================
// CARGA DE DATOS DESDE LA API (fetch)
// ================================================================
// fetch() es la forma moderna de hacer peticiones HTTP desde JavaScript.
// Es asíncrono: no bloquea el navegador mientras espera la respuesta.
async function cargarAeropuertos() {
    try {
        document.getElementById('loading').style.display = 'flex';

        // Petición GET a nuestra API REST
        const respuesta = await fetch(API_GEOJSON_URL);

        if (!respuesta.ok) {
            throw new Error(`Error HTTP: ${respuesta.status}`);
        }

        // Convertir la respuesta a objeto JavaScript
        const geojson = await respuesta.json();
        todosLosAeropuertos = geojson.features;

        // Actualizar el contador en el header
        document.getElementById('total-count').textContent = todosLosAeropuertos.length;

        // Alimentar el mapa con los datos de la API
        map.getSource('aeropuertos').setData(geojson);

        // Poblar la lista lateral
        poblarLista(todosLosAeropuertos);

        document.getElementById('loading').style.display = 'none';

    } catch (error) {
        console.error('Error cargando aeropuertos:', error);
        document.getElementById('loading').innerHTML = `
            <div style="color:#f87171; text-align:center">
                <div style="font-size:2rem">⚠️</div>
                <div>Error al cargar datos</div>
                <div style="font-size:0.75rem; margin-top:8px">${error.message}</div>
                <button onclick="cargarAeropuertos()" style="margin-top:12px; padding:6px 16px;
                    background:var(--color-accent); color:white; border:none;
                    border-radius:6px; cursor:pointer;">Reintentar</button>
            </div>
        `;
    }
}

// ================================================================
// CUANDO EL MAPA TERMINA DE CARGAR
// ================================================================
map.on('load', () => {
    // Agregar fuente de datos vacía primero
    // Los datos llegarán después desde la API con setData()
    map.addSource('aeropuertos', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] }, // vacío al inicio
        cluster: true,
        clusterMaxZoom: 7,
        clusterRadius: 50,
    });

    // --- CAPA: GRUPOS (CLUSTERS) ---
    map.addLayer({
        id: 'clusters',
        type: 'circle',
        source: 'aeropuertos',
        filter: ['has', 'point_count'],  // Solo aplica a puntos agrupados
        paint: {
            // El tamaño y color cambia según cuántos puntos agrupa
            'circle-color': [
                'step', ['get', 'point_count'],
                '#1d4ed8',   // azul oscuro para grupos pequeños (< 10)
                10, '#2563eb',   // azul medio (< 30)
                30, '#3b82f6',   // azul claro (>= 30)
            ],
            'circle-radius': [
                'step', ['get', 'point_count'],
                18, 10, 24, 30, 30
            ],
            'circle-stroke-width': 2,
            'circle-stroke-color': 'rgba(59, 130, 246, 0.4)',
        }
    });

    // --- CAPA: NÚMERO DENTRO DEL GRUPO ---
    map.addLayer({
        id: 'cluster-count',
        type: 'symbol',
        source: 'aeropuertos',
        filter: ['has', 'point_count'],
        layout: {
            'text-field': '{point_count_abbreviated}',
            'text-font': ['Open Sans Bold'],
            'text-size': 13,
        },
        paint: { 'text-color': '#ffffff' }
    });

    // --- CAPA: AEROPUERTOS INDIVIDUALES ---
    map.addLayer({
        id: 'aeropuertos-individuales',
        type: 'circle',
        source: 'aeropuertos',
        filter: ['!', ['has', 'point_count']],  // Solo puntos NO agrupados
        paint: {
            'circle-color': '#38bdf8',
            'circle-radius': [
                'interpolate', ['linear'], ['zoom'],
                4, 4,    // zoom 4 → radio 4px
                10, 8,   // zoom 10 → radio 8px
                14, 12   // zoom 14 → radio 12px
            ],
            'circle-stroke-width': 1.5,
            'circle-stroke-color': 'rgba(56, 189, 248, 0.5)',
            // Efecto de brillo/glow con sombra
            'circle-opacity': 0.9,
        }
    });

    // ----------------------------------------------------------------
    // INTERACCIONES DEL MAPA
    // ----------------------------------------------------------------

    // Al hacer clic en un grupo → hacer zoom para desagrupar
    map.on('click', 'clusters', (e) => {
        const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
        const clusterId = features[0].properties.cluster_id;
        map.getSource('aeropuertos').getClusterExpansionZoom(clusterId, (err, zoom) => {
            if (err) return;
            map.easeTo({ center: features[0].geometry.coordinates, zoom });
        });
    });

    // Al hacer clic en un aeropuerto individual → mostrar popup
    map.on('click', 'aeropuertos-individuales', (e) => {
        const props = e.features[0].properties;
        const coords = e.features[0].geometry.coordinates.slice();

        document.getElementById('selected-iata').textContent = props.codigo_iata;
        highlightListItem(props.codigo_iata);

        new maplibregl.Popup({ offset: 12, closeButton: true })
            .setLngLat(coords)
            .setHTML(`
                <div class="popup-iata">${props.codigo_iata}</div>
                <div class="popup-name">${props.nombre}</div>
                <div class="popup-detail">🏙️ <span>${props.ciudad}</span></div>
                <div class="popup-detail">🌍 <span>${props.pais}</span></div>
                ${props.codigo_icao ? `<div class="popup-detail">📡 ICAO: <span>${props.codigo_icao}</span></div>` : ''}
                <div class="popup-detail">📍 <span>${coords[1].toFixed(4)}°, ${coords[0].toFixed(4)}°</span></div>
            `)
            .addTo(map);
    });

    // Cambiar cursor al pasar sobre puntos interactivos
    map.on('mouseenter', 'aeropuertos-individuales', () => {
        map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', 'aeropuertos-individuales', () => {
        map.getCanvas().style.cursor = '';
    });
    map.on('mouseenter', 'clusters', () => {
        map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', 'clusters', () => {
        map.getCanvas().style.cursor = '';
    });

    // Poblar la lista lateral
    poblarLista(todosLosAeropuertos);

    // Cargar datos desde la API
    cargarAeropuertos();
});

// ================================================================
// LISTA LATERAL DE AEROPUERTOS
// ================================================================
function poblarLista(features) {
    const lista = document.getElementById('airport-list');
    lista.innerHTML = '';

    // Ordenar por código IATA
    const ordenados = [...features].sort((a, b) =>
        a.properties.codigo_iata.localeCompare(b.properties.codigo_iata)
    );

    ordenados.forEach(f => {
        const p = f.properties;
        const item = document.createElement('div');
        item.className = 'airport-item';
        item.setAttribute('role', 'listitem');
        item.setAttribute('data-iata', p.codigo_iata);
        item.innerHTML = `
            <span class="airport-iata">${p.codigo_iata}</span>
            <div class="airport-info">
                <div class="airport-name">${p.ciudad}</div>
                <div class="airport-location">${p.pais}</div>
            </div>
        `;
        item.addEventListener('click', () => {
            const [lon, lat] = f.geometry.coordinates;
            map.flyTo({ center: [lon, lat], zoom: 10, duration: 1200 });
            document.getElementById('selected-iata').textContent = p.codigo_iata;
            highlightListItem(p.codigo_iata);

            setTimeout(() => {
                new maplibregl.Popup({ offset: 12 })
                    .setLngLat([lon, lat])
                    .setHTML(`
                        <div class="popup-iata">${p.codigo_iata}</div>
                        <div class="popup-name">${p.nombre}</div>
                        <div class="popup-detail">🏙️ <span>${p.ciudad}</span></div>
                        <div class="popup-detail">🌍 <span>${p.pais}</span></div>
                    `)
                    .addTo(map);
            }, 1200);
        });

        lista.appendChild(item);
    });
}

// Resaltar el elemento activo en la lista
function highlightListItem(iata) {
    document.querySelectorAll('.airport-item').forEach(el => {
        el.classList.toggle('active', el.dataset.iata === iata);
    });
}

// ================================================================
// BUSCADOR EN TIEMPO REAL (ahora con filtro a la API)
// ================================================================
let searchTimeout = null;

document.getElementById('search-input').addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();

    // Filtrar localmente sobre los datos ya cargados (rápido, sin nueva petición)
    const filtrados = query === ''
        ? todosLosAeropuertos
        : todosLosAeropuertos.filter(f => {
            const p = f.properties;
            return p.codigo_iata.toLowerCase().includes(query)
                || p.ciudad.toLowerCase().includes(query)
                || p.pais.toLowerCase().includes(query)
                || p.nombre.toLowerCase().includes(query);
        });

    poblarLista(filtrados);

    // Actualizar el mapa con los resultados filtrados
    map.getSource('aeropuertos').setData({
        type: 'FeatureCollection',
        features: filtrados
    });

    // Si hay exactamente un resultado, volar a él
    if (filtrados.length === 1) {
        const [lon, lat] = filtrados[0].geometry.coordinates;
        map.flyTo({ center: [lon, lat], zoom: 9, duration: 1000 });
    }
});
</script>

</body>
</html>
