<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeropuertosGlobal — Dashboard Analítico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <style>
    :root {
        --bg:           #07090f;
        --panel:        rgba(9, 13, 26, 0.94);
        --border:       rgba(255,255,255,0.07);
        --accent:       #3b82f6;
        --cyan:         #06b6d4;
        --text:         #e2e8f0;
        --text-muted:   #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
    }

    #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 16px 24px;
        border-radius: 12px;
        margin-bottom: 20px;
    }

    .brand { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--cyan)); border-radius: 8px; display: flex; align-items: center; justify-content: center; }

    .btn {
        background: rgba(255,255,255,0.05); border: 1px solid var(--border);
        color: var(--text); padding: 8px 16px; border-radius: 8px;
        cursor: pointer; font-family: inherit; font-size: 0.85rem; transition: 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn-primary { background: var(--accent); color: white; border: none; }
    .btn-primary:hover { background: #2563eb; }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        display: flex; flex-direction: column;
    }
    .card.full { grid-column: 1 / -1; }
    
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 15px; color: var(--cyan); }
    
    .chart { width: 100%; height: 400px; }
    .chart-tall { height: 600px; }
    </style>
</head>
<body>

<div id="dashboard-content">
    <header id="header">
        <div class="brand">
            <div class="brand-icon">✈</div>
            AeropuertosGlobal Dashboard
        </div>
        <div style="display: flex; gap: 10px;" id="header-buttons">
            <button class="btn" onclick="window.location.href='/'">← Volver al mapa</button>
        </div>
    </header>

    <div class="grid">
        <!-- Sankey Chart: Flujos de Paises -->
        <div class="card full">
            <div class="card-title">🌐 Flujo Internacional de Pasajeros (Top 50 Rutas País-País)</div>
            <div id="chart-sankey" class="chart chart-tall"></div>
        </div>

        <!-- Heatmap: Dia vs Hora -->
        <div class="card full">
            <div class="card-title">🕐 Densidad de Tráfico (Día vs Hora de Salida)</div>
            <div id="chart-heatmap" class="chart"></div>
        </div>
    </div>
</div>

<script>
// ==========================================================
// ECHARTS THEME CONFIG
// ==========================================================
const chartColor = '#e2e8f0';
const axisColor = '#64748b';

function getSankeyOption(data) {
    const nodesMap = new Map();
    const links = [];
    
    data.forEach(d => {
        const o = d.origen_iso + ' (O)';
        const dest = d.destino_iso + ' (D)';
        nodesMap.set(o, true);
        nodesMap.set(dest, true);
        links.push({
            source: o,
            target: dest,
            value: d.pasajeros
        });
    });
    
    const nodes = Array.from(nodesMap.keys()).map(name => ({ name }));
    
    return {
        tooltip: { trigger: 'item', triggerOn: 'mousemove' },
        series: {
            type: 'sankey',
            layout: 'none',
            emphasis: { focus: 'adjacency' },
            nodeAlign: 'left',
            data: nodes,
            links: links,
            lineStyle: { color: 'gradient', curveness: 0.5 },
            label: { color: chartColor, fontSize: 12 },
            itemStyle: { borderWidth: 1, borderColor: '#aaa' }
        }
    };
}

function getStreamgraphOption(data) {
    const hours = Array.from({length:24}, (_,i) => i+'h');
    const days = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
    
    // Crear la matriz de 7 días x 24 horas con ceros
    const seriesData = Array.from({length: 7}, () => Array(24).fill(0));
    data.forEach(d => {
        if(seriesData[d.dia]) {
            seriesData[d.dia][d.hora] = d.pasajeros;
        }
    });

    // Definir una paleta vibrante para los 7 días
    const colors = ['#ef4444', '#f97316', '#f59e0b', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6'];

    const series = days.map((day, idx) => ({
        name: day,
        type: 'line',
        stack: 'Total',
        smooth: true,
        lineStyle: { width: 1 },
        showSymbol: false,
        areaStyle: {
            opacity: 0.8
        },
        emphasis: { focus: 'series' },
        data: seriesData[idx]
    }));

    return {
        color: colors,
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'cross', label: { backgroundColor: '#1e293b' } }
        },
        legend: { 
            data: days, 
            textStyle: { color: chartColor }, 
            top: 0 
        },
        grid: { left: '2%', right: '4%', bottom: '3%', top: '15%', containLabel: true },
        xAxis: [
            {
                type: 'category',
                boundaryGap: false,
                data: hours,
                axisLabel: { color: axisColor },
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } }
            }
        ],
        yAxis: [
            {
                type: 'value',
                splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } },
                axisLabel: { color: axisColor, formatter: val => (val/1000) + 'k' }
            }
        ],
        series: series
    };
}

// ==========================================================
// DATA FETCHING & RENDERING
// ==========================================================
async function initDashboard() {
    const chartSankey = echarts.init(document.getElementById('chart-sankey'), 'dark');
    const chartHeatmap = echarts.init(document.getElementById('chart-heatmap'), 'dark');
    
    // Use the transparent background for dark mode to match our CSS
    chartSankey.getZr().painter.setBackgroundColor('transparent');
    chartHeatmap.getZr().painter.setBackgroundColor('transparent');
    
    chartSankey.showLoading();
    chartHeatmap.showLoading();

    try {
        const [matriz, heatmap] = await Promise.all([
            fetch('/api/pnr/matriz-paises/?top=60').then(r => r.json()),
            fetch('/api/pnr/heatmap-tiempo/').then(r => r.json())
        ]);
        
        chartSankey.hideLoading();
        chartSankey.setOption(getSankeyOption(matriz));
        
        chartHeatmap.hideLoading();
        chartHeatmap.setOption(getStreamgraphOption(heatmap));
        
    } catch (e) {
        console.error("Error loading dashboard data:", e);
    }
    
    window.addEventListener('resize', () => {
        chartSankey.resize();
        chartHeatmap.resize();
    });
}

initDashboard();
</script>

</body>
</html>
